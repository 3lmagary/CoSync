version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosync-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_PATH=/app/data/sync.db
      - JWT_SECRET=sync-platform-super-secret-key-1337
      - LOG_LEVEL=info
      - ENABLE_METRICS=true
      - ENABLE_BACKUPS=true
      - ENABLE_RATE_LIMIT=true
      - ENABLE_SNAPSHOTS=true
    volumes:
      - sqlite-data:/app/data
      - wal-data:/app/wal
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "autoexposer.enable=true"
      - "autoexposer.name=CoSync API"
      - "autoexposer.group=Sync & Backup"
      - "autoexposer.icon=✍️"
      - "autoexposer.port=4000"
      - "autoexposer.subdomain=cosync-api"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:4000
    container_name: cosync-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    labels:
      - "autoexposer.enable=true"
      - "autoexposer.name=CoSync Workspace"
      - "autoexposer.group=Sync & Backup"
      - "autoexposer.icon=✍️"
      - "autoexposer.port=5173"
      - "autoexposer.subdomain=cosync"

volumes:
  sqlite-data:
  wal-data:
