version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cosync-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_PATH=/app/data/sync.db
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
      - ENABLE_METRICS=true
      - ENABLE_BACKUPS=true
      - ENABLE_RATE_LIMIT=true
      - ENABLE_SNAPSHOTS=true
      - CONNECTION_CODE=${CONNECTION_CODE}
    volumes:
      - sqlite-data:/app/data
      - wal-data:/app/wal
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "autoexposer.enable=true"
      - "autoexposer.name=CoSync API"
      - "autoexposer.group=Sync & Backup"
      - "autoexposer.icon=si-obsidian"
      - "autoexposer.port=4000"
      - "autoexposer.subdomain=cosync-api"

volumes:
  sqlite-data:
  wal-data:
